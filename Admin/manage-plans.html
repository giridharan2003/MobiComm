  <!-- Custom Script -->
  <script>
    let plansData = [];

    async function fetchPlans() {
      try {
        const response = await fetch('http://localhost:3000/plans');
        if (!response.ok) {
          throw new Error('Failed to fetch plans');
        }
        const data = await response.json();
        plansData = data; // Store the fetched data
        displayPlans(plansData);
      } catch (error) {
        console.error('Error fetching plans:', error);
      }
    }

    // Display plans in the table
    function displayPlans(plans) {
      const tableBody = document.getElementById('plansTableBody');
      tableBody.innerHTML = '';

      plans.forEach(plan => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${plan.plan_id}</td>
          <td>${plan.plan_name}</td>
          <td>₹${plan.price}</td>
          <td>${plan.validity}</td>
          <td>
            <button class="btn ${plan.status === 'Active' ? 'btn-success' : 'btn-secondary'}" onclick="toggleStatus('${plan.plan_id}')">
              ${plan.status === 'Active' ? 'Active' : 'Inactive'}
            </button>
          </td>
          <td>
            <button class="btn btn-primary" onclick="openModifyModal('${plan.plan_id}')">Modify</button>
          </td>
        `;
        tableBody.appendChild(row);
      });
    }

    // Toggle plan status
    async function toggleStatus(planId) {
      const plan = plansData.find(p => p.plan_id === planId);
      plan.status = plan.status === 'Active' ? 'Inactive' : 'Active';

      // Update the server
      await updatePlan(plan);

      // Refresh the table
      displayPlans(plansData);
    }

    // Open modify modal
    function openModifyModal(planId) {
      const plan = plansData.find(p => p.plan_id === planId);
      document.getElementById('planId').value = plan.plan_id;
      document.getElementById('planName').value = plan.plan_name;
      document.getElementById('price').value = plan.price;
      document.getElementById('validity').value = plan.validity;
      document.getElementById('data').value = plan.data;
      document.getElementById('callSms').value = plan.call_sms;
      document.getElementById('additionalFeatures').value = plan.additional_features;
      document.getElementById('special').value = plan.special;

      const modal = new bootstrap.Modal(document.getElementById('modifyPlanModal'));
      modal.show();
    }

    // Save changes in the modal
    document.getElementById('saveChangesButton').addEventListener('click', async () => {
      const planId = document.getElementById('planId').value;
      const plan = plansData.find(p => p.plan_id === planId);

      plan.plan_name = document.getElementById('planName').value;
      plan.price = document.getElementById('price').value;
      plan.validity = document.getElementById('validity').value;
      plan.data = document.getElementById('data').value;
      plan.call_sms = document.getElementById('callSms').value;
      plan.additional_features = document.getElementById('additionalFeatures').value;
      plan.special = document.getElementById('special').value;

      // Update the server
      await updatePlan(plan);

      // Refresh the table
      displayPlans(plansData);

      // Close the modal
      const modal = bootstrap.Modal.getInstance(document.getElementById('modifyPlanModal'));
      modal.hide();
    });

    // Update plan on the server
    async function updatePlan(plan) {
      try {
        const response = await fetch(`http://localhost:3000/plans/${plan.plan_id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(plan),
        });
        if (!response.ok) {
          throw new Error('Failed to update plan');
        }
      } catch (error) {
        console.error('Error updating plan:', error);
      }
    }

    // Fetch plans when the page loads
    document.addEventListener('DOMContentLoaded', fetchPlans);

    function openAddPlanModal() {
      document.getElementById("addPlanForm").reset();
      new bootstrap.Modal(document.getElementById("addPlanModal")).show();
    }

    async function addPlan() {
      const newPlan = {
        plan_id: document.getElementById("newPlanId").value,
        category: document.getElementById("newCategory").value,
        plan_name: document.getElementById("newPlanName").value,
        price: document.getElementById("newPrice").value,
        data: document.getElementById("newData").value,
        call_sms: document.getElementById("newCallSms").value,
        validity: document.getElementById("newValidity").value,
        additional_features: document.getElementById("newAdditionalFeatures").value,
        special: document.getElementById("newSpecial").value,
        status: "Active"
      };

      try {
        const response = await fetch('http://localhost:3000/plans', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newPlan)
        });

        if (!response.ok) {
          throw new Error('Failed to add plan');
        }

        plansData.push(newPlan);
        displayPlans(plansData);
        bootstrap.Modal.getInstance(document.getElementById("addPlanModal")).hide();
      } catch (error) {
        console.error('Error adding plan:', error);
      }
    }
  </script>
