  <script>
    async function fetchUsers() {
      try {
        const response = await fetch('http://localhost:3000/users'); // Replace with your API endpoint
        if (!response.ok) {
          throw new Error('Failed to fetch user data');
        }
        const data = await response.json();
        displayUsers(data);
      } catch (error) {
        console.error('Error fetching user data:', error);
      }
    }

    function displayUsers(users) {
      const tableBody = document.getElementById('userTableBody');
      tableBody.innerHTML = '';

      users.forEach(user => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${user.userid}</td>
          <td>${user.name}</td>
          <td>${user.phone_number}</td>
          <td>${user.email}</td>
        `;
        tableBody.appendChild(row);
      });
    }
    document.addEventListener('DOMContentLoaded', fetchUsers);

    document.addEventListener("DOMContentLoaded", async function () {
      const userTableBody = document.getElementById("userTableBody");
      const historyTableBody = document.getElementById("historyTableBody");
      const userName = document.getElementById("userName");
      const userPhone = document.getElementById("userPhone");
      const userEmail = document.getElementById("userEmail");

      async function fetchData(url) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error("Failed to fetch data");
          return await response.json();
        } catch (error) {
          console.error("Error fetching data:", error);
          return [];
        }
      }

      const users = await fetchData("http://localhost:3000/users");
      const plans = await fetchData("http://localhost:3000/plans");
      const userHistory = await fetchData("http://localhost:3000/userHistory");

      function displayUsers() {
        userTableBody.innerHTML = "";
        users.forEach(user => {
          const row = document.createElement("tr");
          row.innerHTML = `
          <td>${user.userid}</td>
          <td>${user.name}</td>
          <td>${user.phone_number}</td>
          <td>${user.email}</td>
        `;
          row.addEventListener("click", () => showUserHistory(user));
          userTableBody.appendChild(row);
        });
      }

      function showUserHistory(user) {
        userName.textContent = user.name;
        userPhone.textContent = user.phone_number;
        userEmail.textContent = user.email;

        const userRechargeData = userHistory.filter(history => history.userId === user.userid);
        historyTableBody.innerHTML = "";

        userRechargeData.forEach(history => {
          const plan = plans.find(p => p.plan_id === history.planId);
          if (plan) {
            const row = document.createElement("tr");
            row.innerHTML = `
            <td>${plan.plan_name}</td>
            <td>₹${plan.price}</td>
            <td>${plan.validity}</td>
            <td>${history.dateOfPayment}</td>
            <td>${history.paymentType}</td>
          `;
            historyTableBody.appendChild(row);
          }
        });

        const modal = new bootstrap.Modal(document.getElementById("userHistoryModal"));
        modal.show();
      }

      displayUsers();
    });
  </script>
